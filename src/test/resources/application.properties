# Test configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.spatial.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect

# JWT settings (test values)
jwt.access-token.expiration=3600000
jwt.secretKey=test-secret-key-for-testing-purposes-only-should-be-at-least-256-bits

# OAuth2 Client settings for Kakao (test values)
spring.security.oauth2.client.registration.kakao.client-id=test-client-id
spring.security.oauth2.client.registration.kakao.client-secret=test-client-secret
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.scope=account_email

spring.security.oauth2.uri.base=http://localhost:3000
# OAuth2 회원가입 Redirect Path
spring.security.oauth2.uri.path.sign-up=/sign-up
# OAuth2 인증 Redirect Path
spring.security.oauth2.uri.path.auth=/auth

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# SpringDoc OpenAPI settings (disabled for tests)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging configuration for test
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.example.demo=DEBUG

# Testcontainers will override these database settings automatically
# PostgreSQL Database settings (fallback for manual testing)
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres?currentSchema=test_app&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=8033
