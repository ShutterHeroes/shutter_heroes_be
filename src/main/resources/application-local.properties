# Profile activation
spring.config.activate.on-profile=local

# Import secret properties (API keys, passwords, etc.)
# Make sure to create application-secret.properties from application-secret.properties.example
spring.config.import=classpath:application-secret.properties

# PostgreSQL Database settings
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres?currentSchema=app&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
# Password is set in application-secret.properties

# JPA settings
spring.jpa.show-sql=true
# PostgreSQL Dialect (using default for spatial support)
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.properties.hibernate.default_schema=app

# Kakao client-secret is set in application-secret.properties

# OAuth2 Redirect URIs (로그인 후 연결될 프론트 페이지의 도메인 주소)
spring.security.oauth2.uri.base=http://localhost:3000
# OAuth2 회원가입 Redirect Path
spring.security.oauth2.uri.path.sign-up=/sign-up
# OAuth2 인증 Redirect Path
spring.security.oauth2.uri.path.auth=/auth
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao

# OpenAI API settings
# openai.api-key is set in application-secret.properties
openai.api-url=https://api.openai.com/v1
openai.model=gpt-4.1-mini
# Vision API용 모델 (이미지 분석 전용)
openai.vision-model=gpt-4o

# Spring MVC async request timeout (120 seconds = 120000 ms)
spring.mvc.async.request-timeout=120000

# Logging settings (commented out for local readability)
# logging.config=classpath:logback/logback-local.xml
