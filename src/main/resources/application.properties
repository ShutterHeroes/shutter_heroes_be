 # Spring profiles
spring.profiles.default=local

# JPA settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# SpringDoc OpenAPI settings
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.with-credentials=true
springdoc.swagger-ui.persist-authorization=true

# OAuth2 Client settings for Kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.scope=account_email

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# JWT settings
# 1 hour (60 minutes * 60 seconds * 1000 milliseconds)
jwt.access-token.expiration=3600000
jwt.secretKey=132bd40bb5c9703277ae1432643568672b3d566b40fafdc9c9b5ba1e8065c5fb
